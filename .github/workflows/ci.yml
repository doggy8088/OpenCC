name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      override_release:
        description: Delete existing release/tag for the same version
        type: boolean
        required: false
        default: false

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OpenCC.sln

      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore OpenCC.sln

      - name: Build
        run: dotnet build OpenCC.sln -c Release --no-restore

      - name: Test
        run: dotnet test tests/OpenCC.Tests/OpenCC.Tests.csproj -c Release --no-build

  release:
    if: (github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)) || github.event_name == 'workflow_dispatch'
    needs: build-test
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Select-Xml -Path src/OpenCC/OpenCC.csproj -XPath "/Project/PropertyGroup/Version").Node.InnerText
          if (-not $version) { throw "Version not found in OpenCC.csproj." }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Detect version change
        id: change
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -ne 'push') {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $before = "${{ github.event.before }}"
          $after = "${{ github.sha }}"
          if ($before -eq "0000000000000000000000000000000000000000") {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          git cat-file -e "$before^{commit}" 2>$null
          if (-not $?) {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $diff = git diff $before $after -- src/OpenCC/OpenCC.csproj
          if ($diff -match "<Version>") {
            "changed=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "changed=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Check tag exists
        id: tag
        shell: pwsh
        run: |
          git fetch --tags --force
          $tag = "v${{ steps.version.outputs.version }}"
          $tagExists = git tag -l $tag
          if ($tagExists) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Delete existing release (override)
        if: github.event_name == 'workflow_dispatch' && inputs.override_release == 'true' && steps.tag.outputs.exists == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          gh release view $tag 2>$null | Out-Null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --yes --cleanup-tag
            exit 0
          }
          git push --delete origin $tag

      - name: Create release
        if: steps.change.outputs.changed == 'true' && (steps.tag.outputs.exists == 'false' || inputs.override_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
